version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Enable BuildKit cache for faster builds
      cache_from:
        - web_deps:latest
        - web_builder:latest
      cache_to:
        - inline
      args:
        - NODE_ENV=production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

x-common-cache: &common-cache
  cache_from:
    - web_deps:latest
  cache_to:
    - inline
