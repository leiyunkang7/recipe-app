services:
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      # Enable BuildKit for faster builds
      args:
        - NODE_ENV=production
    ports:
      - "3000:3000"
    environment:
      - DOCKER_BUILDKIT=0
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://recipe_user:recipe_password@localhost:5432/recipe_app}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: build cache persistence service
  # docker volume create web-bun-cache --driver local
