name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install
      - name: Run lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install
      - name: Run type check
        run: bun run build
      - name: Run unit tests
        run: bun run test:run

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install
      - name: Install Playwright browsers
        run: bun run test:e2e:install
      - name: Build
        run: bun run build
      - name: Run E2E tests
        run: bun run test:e2e
